<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 340px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0f;
    color: #e8e6f0;
    font-size: 13px;
  }

  .header {
    padding: 16px 18px 12px;
    background: linear-gradient(135deg, #0d0d18, #12121f);
    border-bottom: 1px solid #1e1e2e;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header svg { flex-shrink: 0; }
  .header h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .header .sub { font-size: 11px; color: #8886a0; margin-top: 2px; }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    padding: 14px 18px;
  }
  .stat {
    background: #12121a;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    padding: 12px 10px;
    text-align: center;
  }
  .stat .num {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .stat .label {
    font-size: 10px;
    color: #8886a0;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat.probes .num { color: #ef4444; }
  .stat.fingerprints .num { color: #f59e0b; }
  .stat.trackers .num { color: #6366f1; }

  .total-bar {
    margin: 0 18px 14px;
    padding: 10px 14px;
    background: #12121a;
    border: 1px solid #1e1e2e;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .total-bar .total-label { font-size: 12px; color: #8886a0; }
  .total-bar .total-num { font-size: 18px; font-weight: 800; color: #22c55e; }

  .status {
    padding: 10px 18px;
    font-size: 11px;
    color: #56546a;
    border-top: 1px solid #1e1e2e;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #22c55e;
    display: inline-block;
    margin-right: 5px;
  }

  .ai-section {
    padding: 12px 18px;
    border-top: 1px solid #1e1e2e;
  }
  .ai-btn {
    width: 100%;
    padding: 8px;
    background: #6366f1;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .ai-btn:hover { background: #5558e8; }
  .ai-btn:disabled { background: #2a2a3e; color: #56546a; cursor: default; }
  .ai-result {
    margin-top: 10px;
    padding: 10px 12px;
    background: #0d0d14;
    border: 1px solid #1e1e2e;
    border-radius: 8px;
    font-size: 11.5px;
    line-height: 1.6;
    color: #b0aec0;
    display: none;
  }
  .ai-result.visible { display: block; }

  .settings-link {
    padding: 8px 18px 14px;
    display: block;
    text-align: center;
  }
  .settings-link a {
    color: #6366f1;
    font-size: 11px;
    text-decoration: none;
    cursor: pointer;
  }
  .settings-link a:hover { text-decoration: underline; }

  .footer {
    padding: 8px 18px 12px;
    border-top: 1px solid #1e1e2e;
    text-align: center;
    font-size: 10px;
    color: #3a3854;
  }
  .footer a { color: #56546a; text-decoration: none; }
  .footer a:hover { color: #8886a0; }

  .no-linkedin {
    padding: 30px 18px;
    text-align: center;
    color: #56546a;
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="header">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    <div>
      <h1>LinkedIn Shield</h1>
      <div class="sub">Privacy protection active</div>
    </div>
  </div>

  <div id="main-content">
    <div class="stats">
      <div class="stat probes">
        <div class="num" id="probes-count">0</div>
        <div class="label">Probes</div>
      </div>
      <div class="stat fingerprints">
        <div class="num" id="fingerprints-count">0</div>
        <div class="label">Fingerprints</div>
      </div>
      <div class="stat trackers">
        <div class="num" id="trackers-count">0</div>
        <div class="label">Trackers</div>
      </div>
    </div>

    <div class="total-bar">
      <span class="total-label">Total blocked this session</span>
      <span class="total-num" id="total-count">0</span>
    </div>

    <div id="context-section" style="display:none; padding: 8px 18px; border-top: 1px solid #1e1e2e;">
      <div style="font-size: 10px; color: #8886a0; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;">What LinkedIn tried to collect</div>
      <div id="context-details" style="font-size: 11px; color: #b0aec0; line-height: 1.5;"></div>
    </div>

    <div class="ai-section">
      <button class="ai-btn" id="ai-analyze-btn">Explain with AI</button>
      <div class="ai-result" id="ai-result"></div>
    </div>

    <div class="status">
      <span><span class="status-dot"></span> Shielded</span>
      <span id="page-url">linkedin.com</span>
    </div>
  </div>

  <div id="no-linkedin" class="no-linkedin" style="display:none;">
    Navigate to linkedin.com to see protection stats.
  </div>

  <div class="settings-link">
    <a id="settings-toggle">Settings (AI API key)</a>
  </div>

  <div id="settings-panel" style="display:none; padding: 12px 18px; border-top: 1px solid #1e1e2e;">
    <div style="margin-bottom: 8px;">
      <label style="font-size: 11px; color: #8886a0; display: block; margin-bottom: 4px;">AI Provider</label>
      <select id="ai-provider" style="width:100%; padding: 6px 8px; background: #12121a; border: 1px solid #1e1e2e; border-radius: 6px; color: #e8e6f0; font-size: 12px;">
        <option value="openai">OpenAI</option>
        <option value="qmax">QMax (Cheapest)</option>
        <option value="anthropic">Claude (Anthropic)</option>
      </select>
    </div>
    <div style="margin-bottom: 8px;">
      <label style="font-size: 11px; color: #8886a0; display: block; margin-bottom: 4px;">API Key</label>
      <input type="password" id="ai-key" placeholder="sk-..." style="width:100%; padding: 6px 8px; background: #12121a; border: 1px solid #1e1e2e; border-radius: 6px; color: #e8e6f0; font-size: 12px;">
    </div>
    <button id="save-settings" style="width:100%; padding: 6px; background: #22c55e; color: #fff; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer;">Save</button>
    <div id="settings-msg" style="font-size: 10px; color: #22c55e; margin-top: 4px; text-align: center;"></div>
  </div>

  <div class="footer">
    <a href="https://github.com/Quality-Max/linkedin-shield" target="_blank">GitHub</a>
    &middot; Open-source by <a href="https://qualitymax.io" target="_blank">QualityMax</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
